name: Install aqua
description: Install aqua https://aquaproj.github.io/ and install tools with aqua
inputs:
  aqua_version:
    description: Installed aqua's version (e.g. v0.8.7)
    required: true
  github_token:
    description: GitHub access token
    required: false
    default: ${{ github.token }}
  enable_aqua_install:
    required: false
    default: "true"
    description: Whether "aqua i" command is run.
  aqua_opts:
    required: false
    default: "-l"
    description: Command line options for "aqua i"
  policy_allow:
    required: false
    description: |
      aqua >= v2.3.0
      If this isn't empty, "aqua policy allow" is run.
      If this is "true", "aqua policy allow" is run without argument.
      If this isn't empty and isn't "true", "aqua policy allow <inputs.policy_allow>" is run.

  skip_install_aqua:
    required: false
    default: "false"
    description: If this true and aqua is already installed, installing aqua is skipped.

  working_directory:
    required: false
    default: ""
    description: The working directory to run aqua commands
runs:
  using: composite
  steps:
    - name: Subscription check
      env:
        REPO_PRIVATE: ${{ github.event.repository.private }}
      run: |
        UPSTREAM="aquaproj/aqua-installer"
        ACTION_REPO="${GITHUB_ACTION_REPOSITORY:-}"
        DOCS_URL="https://docs.stepsecurity.io/actions/stepsecurity-maintained-actions"

        echo ""
        echo -e "\033[1;36mStepSecurity Maintained Action\033[0m"
        echo "Secure drop-in replacement for $UPSTREAM"
        if [ "$REPO_PRIVATE" = "false" ]; then
          echo -e "\033[32m✓ Free for public repositories\033[0m"
        fi
        echo -e "\033[36mLearn more:\033[0m $DOCS_URL"
        echo ""

        if [ "$REPO_PRIVATE" != "false" ]; then
          SERVER_URL="${GITHUB_SERVER_URL:-https://github.com}"

          if [ "$SERVER_URL" != "https://github.com" ]; then
            BODY=$(printf '{"action":"%s","ghes_server":"%s"}' "$ACTION_REPO" "$SERVER_URL")
          else
            BODY=$(printf '{"action":"%s"}' "$ACTION_REPO")
          fi

          API_URL="https://agent.api.stepsecurity.io/v1/github/$GITHUB_REPOSITORY/actions/maintained-actions-subscription"

          RESPONSE=$(curl --max-time 3 -s -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "$API_URL" -o /dev/null) && CURL_EXIT_CODE=0 || CURL_EXIT_CODE=$?

          if [ $CURL_EXIT_CODE -ne 0 ]; then
            echo "Timeout or API not reachable. Continuing to next step."
          elif [ "$RESPONSE" = "403" ]; then
            echo -e "::error::\033[1;31mThis action requires a StepSecurity subscription for private repositories.\033[0m"
            echo -e "::error::\033[31mLearn how to enable a subscription: $DOCS_URL\033[0m"
            exit 1
          fi
        fi
      shell: bash

    - run: |
        echo "::error ::aqua_version is required. https://github.com/step-security/aqua-installer"
        exit 1
      shell: bash
      if: inputs.aqua_version == ''

    - run: echo "${AQUA_ROOT_DIR:-${XDG_DATA_HOME:-$HOME/.local/share}/aquaproj-aqua}/bin" >> $GITHUB_PATH
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      if: runner.os != 'Windows'

    - run: |
        echo "${AQUA_ROOT_DIR:-$HOME/AppData/Local/aquaproj-aqua}/bin" >> $GITHUB_PATH
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      if: runner.os == 'Windows'

    - run: |
        $(if($env:AQUA_ROOT_DIR) {echo $env:AQUA_ROOT_DIR} else {echo "$HOME/AppData/Local/aquaproj-aqua/bin"}) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      shell: pwsh
      working-directory: ${{ inputs.working_directory }}
      if: runner.os == 'Windows'

    - run: |
        if [ "${SKIP_INSTALL_AQUA:-}" = true ] && command -v aqua >/dev/null; then
          echo "[INFO] Installing aqua is skipped" >&2
          exit 0
        fi
        "${GITHUB_ACTION_PATH}/aqua-installer" -v "$AQUA_VERSION"
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      env:
        AQUA_VERSION: ${{ inputs.aqua_version }}
        SKIP_INSTALL_AQUA: ${{ inputs.skip_install_aqua }}
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - run: aqua policy allow
      working-directory: ${{ inputs.working_directory }}
      if: inputs.policy_allow == 'true'
      shell: bash

    - run: aqua policy allow "$POLICY_FILE"
      working-directory: ${{ inputs.working_directory }}
      if: |
        inputs.policy_allow != 'true' && inputs.policy_allow != ''
      shell: bash
      env:
        POLICY_FILE: ${{ inputs.policy_allow }}

    - run: aqua i $AQUA_OPTS
      if: inputs.enable_aqua_install == 'true'
      working-directory: ${{ inputs.working_directory }}
      shell: bash
      env:
        AQUA_OPTS: ${{ inputs.aqua_opts }}
        GITHUB_TOKEN: ${{ inputs.github_token }}
